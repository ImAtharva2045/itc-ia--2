<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huffman Encoding Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f8;color:#222;font-size:14px;}

#topbar{
  background:#fff;border-bottom:1px solid #e5e7eb;
  padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
#topbar h1{font-size:20px;font-weight:700;color:#3730a3;letter-spacing:-.3px;}
#topbar .subtitle{font-size:12px;color:#888;margin-left:10px;}

.page{display:none;width:100%;min-height:calc(100vh - 56px);}
.page.active{display:flex;}

#page-input{justify-content:center;align-items:flex-start;padding:40px 20px;}
.input-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:32px 36px;width:100%;max-width:560px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.input-card h2{font-size:18px;font-weight:700;color:#1e1b4b;margin-bottom:4px;}
.input-card .sub{font-size:13px;color:#888;margin-bottom:22px;}
.sym-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.sym-row label{font-size:12px;color:#666;width:62px;}
input[type=text],input[type=number]{border:1px solid #d1d5db;border-radius:8px;padding:7px 11px;font-size:14px;background:#fff;color:#222;transition:border-color .2s;}
input[type=text]{width:85px;}
input[type=number]{width:105px;}
input:focus{outline:none;border-color:#6366f1;}
.btn{border:1px solid #d1d5db;border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;background:#fff;color:#222;transition:background .15s;}
.btn:hover{background:#f3f4f6;}
.btn-primary{background:#6366f1;color:#fff;border-color:#6366f1;font-weight:600;padding:10px 28px;font-size:14px;}
.btn-primary:hover{background:#4f46e5;}
.btn-remove{color:#e24b4a;border-color:#fca5a5;padding:6px 10px;}
.btn-remove:hover{background:#fff1f1;}
.btn-nav{padding:7px 18px;font-weight:600;font-size:13px;}
.btn-nav:disabled{opacity:.35;cursor:not-allowed;}
.prob-sum{font-size:13px;color:#6b7280;}
.sum-ok{color:#059669;font-weight:700;}
.sum-bad{color:#dc2626;}
.error-msg{color:#dc2626;font-size:13px;margin-top:8px;display:none;}

#page-viz{flex-direction:row;overflow:hidden;height:calc(100vh - 56px);}

#panel-left{
  width:370px;min-width:320px;max-width:420px;
  background:#fff;border-right:1px solid #e5e7eb;
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
#panel-left-top{padding:14px 18px 12px;border-bottom:1px solid #f0f0f0;}
#panel-left-top h2{font-size:15px;font-weight:700;color:#1e1b4b;margin-bottom:4px;}
#step-desc{font-size:13px;color:#555;line-height:1.6;margin-top:6px;}
#nav-bar{display:flex;align-items:center;gap:6px;margin-top:12px;flex-wrap:wrap;}
#step-counter{font-size:13px;color:#888;min-width:52px;text-align:center;}
#panel-left-body{flex:1;overflow-y:auto;padding:12px 16px;}

#panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8f9fc;}
#panel-right-top{
  padding:7px 14px 6px;border-bottom:1px solid #e5e7eb;background:#fff;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
#panel-right-top h3{font-size:13px;font-weight:700;color:#1e1b4b;}

#tree-wrap{flex:5;min-height:60px;overflow:auto;padding:10px;display:flex;align-items:flex-start;justify-content:center;}
#tree-wrap svg{display:block;}

#drag-handle{
  height:6px;background:#f0f0f5;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;
  cursor:row-resize;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
  user-select:none;-webkit-user-select:none;
}
#drag-handle:hover,#drag-handle.dragging{background:#e0e0f0;}
#drag-handle-grip{width:32px;height:3px;border-radius:2px;background:#c7d2fe;}

#panel-bottom{background:#fff;border-top:none;flex:4;min-height:60px;overflow-y:auto;display:flex;flex-direction:column;}
#panel-bottom-inner{padding:10px 16px;flex:1;overflow-y:auto;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-weight:700;text-align:left;padding:7px 10px;background:#f5f3ff;border-bottom:1px solid #e5e7eb;color:#3730a3;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
td{padding:7px 10px;border-bottom:1px solid #f4f4f4;}
tr:last-child td{border-bottom:none;}

.sym-clickable{cursor:pointer;transition:background .12s;}
.sym-clickable:hover td{background:#f5f3ff;}
.sym-active td{background:#eef2ff!important;}
.cw-badge{font-family:'Courier New',monospace;background:#eef2ff;color:#4338ca;border-radius:5px;padding:3px 8px;font-size:12px;letter-spacing:2px;font-weight:700;}

#path-panel{background:#eef2ff;border-radius:8px;padding:10px 14px;font-size:13px;border:1px solid #c7d2fe;display:none;margin-top:10px;}
.path-title{font-weight:700;color:#3730a3;margin-bottom:8px;font-size:13px;}
.path-steps{display:flex;align-items:center;flex-wrap:wrap;gap:5px;}
.path-node-badge{display:inline-flex;align-items:center;gap:3px;background:#fff;border:1px solid #c7d2fe;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600;color:#3730a3;}
.path-bit-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-weight:800;font-size:12px;font-family:'Courier New',monospace;}
.path-bit-badge.b0{background:#dcfce7;color:#15803d;border:1px solid #86efac;}
.path-bit-badge.b1{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;}
.path-dir{font-size:11px;color:#9ca3af;}
.path-arrow{color:#9ca3af;font-size:14px;}
.path-leaf-badge{background:#6366f1;color:#fff;border-radius:7px;padding:4px 11px;font-size:12px;font-weight:700;}

.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
.metric-card{background:#f5f3ff;border-radius:8px;padding:12px;text-align:center;}
.metric-val{font-size:20px;font-weight:700;color:#4338ca;margin-top:4px;}
.metric-lbl{font-size:11px;color:#555;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.metric-unit{font-size:11px;color:#888;margin-top:2px;}

.tabs{display:flex;gap:2px;border-bottom:1px solid #e5e7eb;padding:0 16px;background:#fff;flex-shrink:0;}
.tab{padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#888;border-bottom:2px solid transparent;transition:color .15s;}
.tab.active{color:#6366f1;border-bottom-color:#6366f1;}

.node-clickable{cursor:pointer;}

@media(max-width:700px){
  #page-viz{flex-direction:column;}
  #panel-left{width:100%;max-width:100%;height:auto;min-height:200px;border-right:none;border-bottom:1px solid #e5e7eb;}
  #panel-right{height:60vh;}
}
</style>
</head>
<body>

<div id="topbar">
  <div style="display:flex;align-items:baseline;gap:6px;">
    <h1>Huffman Encoding</h1>
    <span class="subtitle">Visual Step-by-Step</span>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn" id="btn-edit" style="display:none;" onclick="goEdit()">&#9998; Edit Input</button>
    <button class="btn" id="btn-reset-top" style="display:none;color:#6366f1;border-color:#6366f1;font-weight:600;" onclick="resetAll()">&#8635; Reset</button>
  </div>
</div>

<div class="page active" id="page-input">
  <div class="input-card">
    <h2>Enter Symbols &amp; Probabilities</h2>
    <div class="sub">Probabilities must sum to exactly 1.0</div>
    <div id="symbol-rows"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn" onclick="addRow()">+ Add Symbol</button>
      <span id="prob-sum-display" class="prob-sum"></span>
    </div>
    <div id="input-error" class="error-msg"></div>
    <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="startViz()">&#9654;&nbsp; Visualize Encoding</button>
    </div>
  </div>
</div>

<div class="page" id="page-viz">
  <div id="panel-left">
    <div id="panel-left-top">
      <h2 id="step-title">Step 1</h2>
      <div id="step-desc"></div>
      <div id="nav-bar">
        <button class="btn btn-nav" id="btn-prev" onclick="prevStep()" disabled>&#8592;</button>
        <span id="step-counter"></span>
        <button class="btn btn-nav" id="btn-next" onclick="nextStep()">Next &#8594;</button>
      </div>
    </div>
    <div id="panel-left-body">
      <div id="step-content"></div>
    </div>
  </div>

  <div id="panel-right">
    <div id="panel-right-top">
      <h3>Huffman Tree</h3>
    </div>
    <div id="tree-wrap"><svg id="main-svg"></svg></div>
    <div id="drag-handle"><div id="drag-handle-grip"></div></div>

    <div id="panel-bottom">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('codewords',this)">Final Codewords</div>
        <div class="tab" onclick="switchTab('metrics',this)">Metrics</div>
      </div>
      <div id="panel-bottom-inner">
        <div id="tab-codewords">
          <p style="font-size:12px;color:#888;font-style:italic;margin-bottom:8px;">Click a symbol row or a leaf node in the tree to highlight its path.</p>
          <table>
            <thead><tr><th>Symbol</th><th>Probability</th><th>Codeword</th><th>Bits</th></tr></thead>
            <tbody id="result-body"></tbody>
          </table>
          <div id="path-panel">
            <div class="path-title" id="path-title"></div>
            <div class="path-steps" id="path-steps"></div>
          </div>
        </div>
        <div id="tab-metrics" style="display:none;">
          <div class="metric-row" id="metric-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var symbols=[], steps=[], currentStep=0, codewords={}, activeSymbol=null, huffRoot=null, nodeMap={};

function addRow(sym,prob){
  var idx=symbols.length;
  symbols.push({sym:sym||'',prob:prob||''});
  var d=document.getElementById('symbol-rows');
  var row=document.createElement('div');
  row.className='sym-row'; row.id='sym-row-'+idx;
  row.innerHTML='<label>Symbol</label>'+
    '<input type="text" maxlength="12" placeholder="A" id="sym-'+idx+'" value="'+(sym||'')+'" oninput="updateSym('+idx+')">'+
    '<label>Probability</label>'+
    '<input type="number" min="0.001" max="1" step="0.001" placeholder="0.25" id="prob-'+idx+'" value="'+(prob||'')+'" oninput="updateProb('+idx+')">'+
    '<button class="btn btn-remove" onclick="removeRow('+idx+')">&#10005;</button>';
  d.appendChild(row); updateSum();
}
function removeRow(idx){var r=document.getElementById('sym-row-'+idx);if(r)r.remove();symbols[idx]=null;updateSum();}
function updateSym(idx){if(symbols[idx])symbols[idx].sym=document.getElementById('sym-'+idx).value;}
function updateProb(idx){if(symbols[idx]){symbols[idx].prob=document.getElementById('prob-'+idx).value;updateSum();}}
function updateSum(){
  var active=symbols.filter(function(s){return s&&s.prob!=='';});
  var total=active.reduce(function(a,s){return a+parseFloat(s.prob||0);},0);
  var t=Math.round(total*10000)/10000;
  var el=document.getElementById('prob-sum-display');
  el.textContent='Sum: '+t;
  el.className='prob-sum '+(Math.abs(total-1)<0.0001?'sum-ok':(total>0.001?'sum-bad':''));
}
function showErr(msg){var e=document.getElementById('input-error');e.textContent=msg;e.style.display='block';}

function startViz(){
  document.getElementById('input-error').style.display='none';
  var active=symbols.filter(function(s){return s&&s.sym&&s.sym.trim()&&s.prob!==''&&!isNaN(parseFloat(s.prob));});
  if(active.length<2){showErr('Need at least 2 symbols.');return;}
  var names=active.map(function(s){return s.sym.trim();});
  if(new Set(names).size!==names.length){showErr('Symbol names must be unique.');return;}
  var total=active.reduce(function(a,s){return a+parseFloat(s.prob);},0);
  if(Math.abs(total-1)>0.0001){showErr('Probabilities must sum to 1.0. Got: '+(Math.round(total*10000)/10000));return;}
  var data=active.map(function(s){return{name:s.sym.trim(),prob:parseFloat(s.prob)};});
  buildHuffman(data);
  showPage('viz');
  document.getElementById('btn-edit').style.display='';
  document.getElementById('btn-reset-top').style.display='';
}

function buildHuffman(data){
  steps=[]; codewords={}; activeSymbol=null; huffRoot=null; nodeMap={}; currentStep=0;
  var nextId=0, insertionCounter=0;

  function makeLeaf(d){return{id:nextId++,label:d.name,prob:d.prob,isLeaf:true,left:null,right:null,ins:insertionCounter++};}

  function makeInternal(a,b){
    var p=Math.round((a.prob+b.prob)*100000)/100000;
    return{id:nextId++,label:'',prob:p,isLeaf:false,left:b,right:a,ins:insertionCounter++};
  }

  function sortAsc(q){
    q.sort(function(a,b){
      if(Math.abs(a.prob-b.prob)<1e-9)return a.ins-b.ins;
      return a.prob-b.prob;
    });
  }
  function snapDesc(q){
    return q.slice().sort(function(a,b){
      if(Math.abs(a.prob-b.prob)<1e-9)return b.ins-a.ins;
      return b.prob-a.prob;
    }).map(function(n){return{id:n.id,label:n.label,prob:n.prob,isLeaf:n.isLeaf};});
  }

  var queue=data.map(makeLeaf);
  sortAsc(queue);

  steps.push({
    title:'Initial Arrangement',
    desc:'Symbols are sorted in descending order with respect to probability. Each merge: higher-prob node goes left (bit 0), lower-prob node goes right (bit 1).',
    snap:snapDesc(queue),
    combined:null,mergedId:null,mergedProb:null,
    treeEdges:[],treeNodes:queue.map(function(n){return n.id;}),newNodeId:null
  });

  while(queue.length>1){
    sortAsc(queue);
    var nodeA=queue.shift();
    var nodeB=queue.shift();
    var parent=makeInternal(nodeA,nodeB);
    queue.push(parent);
    sortAsc(queue);

    var allNodeIds=[];
    function collectIds(n){if(!n)return;allNodeIds.push(n.id);collectIds(n.left);collectIds(n.right);}
    queue.forEach(function(n){collectIds(n);});

    var allEdges=[];
    function collectEdgesOf(n){
      if(!n)return;
      if(n.left){allEdges.push({from:n.id,to:n.left.id,bit:'0'});collectEdgesOf(n.left);}
      if(n.right){allEdges.push({from:n.id,to:n.right.id,bit:'1'});collectEdgesOf(n.right);}
    }
    queue.forEach(function(n){collectEdgesOf(n);});

    steps.push({
      title:'Merge & Assign Bits',
      desc:'Higher prob "'+( nodeB.isLeaf?nodeB.label:'p='+nodeB.prob)+'" (p='+nodeB.prob+') → bit 0 (left). Lower prob "'+(nodeA.isLeaf?nodeA.label:'p='+nodeA.prob)+'" (p='+nodeA.prob+') → bit 1 (right). New node p='+parent.prob+'.',
      snap:snapDesc(queue),
      combined:[
        {label:nodeB.isLeaf?nodeB.label:'node(p='+nodeB.prob+')',prob:nodeB.prob,bit:'0'},
        {label:nodeA.isLeaf?nodeA.label:'node(p='+nodeA.prob+')',prob:nodeA.prob,bit:'1'}
      ],
      mergedId:parent.id,mergedProb:parent.prob,
      treeEdges:allEdges,treeNodes:allNodeIds,newNodeId:parent.id
    });
  }

  huffRoot=queue[0];

  var finalEdges=[];
  function collectFinalEdges(n){
    if(!n)return;
    if(n.left){finalEdges.push({from:n.id,to:n.left.id,bit:'0'});collectFinalEdges(n.left);}
    if(n.right){finalEdges.push({from:n.id,to:n.right.id,bit:'1'});collectFinalEdges(n.right);}
  }
  collectFinalEdges(huffRoot);
  var finalNodeIds=[];
  function collectFinalIds(n){if(!n)return;finalNodeIds.push(n.id);collectFinalIds(n.left);collectFinalIds(n.right);}
  collectFinalIds(huffRoot);

  steps.push({
    title:'Tree Complete',
    desc:'Root p=1. Left branch = 0 (higher prob), Right branch = 1 (lower prob). Click any symbol in the table or a leaf node in the tree to highlight its path.',
    snap:snapDesc([huffRoot]),combined:null,mergedId:null,done:true,
    treeEdges:finalEdges,treeNodes:finalNodeIds,newNodeId:null
  });

  traverseTree(huffRoot,'');
  buildNodeMap(huffRoot);
  renderStep();
  renderResults(data);
  renderTree();
}

function buildNodeMap(n){if(!n)return;nodeMap[n.id]=n;buildNodeMap(n.left);buildNodeMap(n.right);}
function traverseTree(node,code){
  if(!node)return;
  if(node.isLeaf){codewords[node.label]=code;return;}
  traverseTree(node.left,code+'0');
  traverseTree(node.right,code+'1');
}
function r3(v){return Math.round(v*1000)/1000;}

function renderStep(){
  var s=steps[currentStep];
  document.getElementById('step-title').textContent='Stage '+(currentStep+1)+': '+s.title;
  document.getElementById('step-desc').textContent=s.desc;
  document.getElementById('step-counter').textContent=(currentStep+1)+' / '+steps.length;
  document.getElementById('btn-prev').disabled=currentStep===0;
  document.getElementById('btn-next').disabled=currentStep===steps.length-1;
  document.getElementById('btn-next').textContent=currentStep===steps.length-2?'Finish \u2713':'Next \u2192';

  var c=document.getElementById('step-content');
  c.innerHTML='';

  if(s.combined){
    var h='<div style="margin-bottom:10px;">';
    h+='<div style="font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Combining</div>';
    h+='<table><thead><tr><th>Node</th><th>Prob</th><th>Bit</th></tr></thead><tbody>';
    s.combined.forEach(function(n){
      var bc=n.bit==='0'?'#059669':'#dc2626';
      var dir=n.bit==='0'?' &#8592; L (higher)':' R &#8594; (lower)';
      h+='<tr><td><strong>'+n.label+'</strong></td><td>'+n.prob+'</td><td style="color:'+bc+';font-weight:800;">'+n.bit+dir+'</td></tr>';
    });
    h+='</tbody></table>';
    h+='<div style="text-align:center;font-size:12px;color:#6366f1;margin:5px 0 0;font-weight:600;">&darr; p = '+s.mergedProb+'</div></div>';
    c.innerHTML=h;
  }

  var q='<div style="font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">'+(s.done?'Root':'Queue (descending)')+'</div>';
  q+='<table><thead><tr><th>#</th><th>Node</th><th>Prob</th><th></th></tr></thead><tbody>';
  s.snap.forEach(function(n,i){
    var isNew=n.id===s.mergedId;
    var rs=isNew?' style="background:#eef2ff;"':'';
    var lbl=n.isLeaf?n.label:'&#8853; merged';
    var tag=isNew?'<span style="color:#6366f1;font-size:11px;font-weight:700;">new</span>':(s.done?'<span style="color:#059669;font-size:11px;">&#10003; root</span>':'');
    q+='<tr'+rs+'><td style="color:#ccc;">'+(i+1)+'</td><td>'+lbl+'</td><td>'+n.prob+'</td><td>'+tag+'</td></tr>';
  });
  q+='</tbody></table>';
  if(s.done)q+='<div style="margin-top:8px;font-size:12px;color:#059669;font-weight:600;">&#10003; Done — see tree and codewords below.</div>';
  c.innerHTML+=q;
  renderTree();
}

function prevStep(){if(currentStep>0){currentStep--;renderStep();}}
function nextStep(){if(currentStep<steps.length-1){currentStep++;renderStep();}}

var NODE_R=24, LEVEL_H=78;

function computeLayout(node,depth,counter){
  if(!node)return;
  if(node.isLeaf){node._x=counter.val*68;counter.val++;}
  else{
    computeLayout(node.left,depth+1,counter);
    computeLayout(node.right,depth+1,counter);
    node._x=(node.left._x+node.right._x)/2;
  }
  node._y=depth*LEVEL_H+NODE_R+14;
}

function collectAllNodes(node,arr){if(!node)return;arr.push(node);collectAllNodes(node.left,arr);collectAllNodes(node.right,arr);}
function collectAllEdges(node,arr){
  if(!node)return;
  if(node.left){arr.push({from:node,to:node.left,bit:'0'});collectAllEdges(node.left,arr);}
  if(node.right){arr.push({from:node,to:node.right,bit:'1'});collectAllEdges(node.right,arr);}
}

function renderTree(){
  if(!huffRoot)return;
  var s=steps[currentStep];
  var isFinalStep=(currentStep===steps.length-1);
  var visibleNodeIds=new Set(s.treeNodes||[]);
  var visibleEdgeSet=new Set((s.treeEdges||[]).map(function(e){return e.from+'-'+e.to;}));
  var newNodeId=s.newNodeId;

  var counter={val:0};
  computeLayout(huffRoot,0,counter);
  var allNodes=[],allEdges=[];
  collectAllNodes(huffRoot,allNodes);
  collectAllEdges(huffRoot,allEdges);

  var minX=Infinity,maxX=-Infinity,maxY=-Infinity;
  allNodes.forEach(function(n){if(n._x<minX)minX=n._x;if(n._x>maxX)maxX=n._x;if(n._y>maxY)maxY=n._y;});
  var pad=55;
  var svgW=Math.max(maxX-minX+pad*2,300);
  var svgH=maxY+NODE_R+pad;
  var ox=pad-minX;

  var pathNodeIds=new Set(),pathEdgeKeys=new Set();
  if(activeSymbol){
    var cw=codewords[activeSymbol]||'';
    var cur=huffRoot; pathNodeIds.add(cur.id);
    for(var i=0;i<cw.length;i++){
      var next=cw[i]==='0'?cur.left:cur.right;
      if(!next)break;
      pathEdgeKeys.add(cur.id+'-'+next.id);
      pathNodeIds.add(next.id);
      cur=next;
    }
  }

  var ns='http://www.w3.org/2000/svg';
  var svg=document.getElementById('main-svg');
  svg.innerHTML='';
  svg.setAttribute('width',svgW);
  svg.setAttribute('height',svgH);
  svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);

  function el(tag,attrs){var e=document.createElementNS(ns,tag);Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});return e;}
  function txt(content,attrs){var t=el('text',attrs);t.textContent=content;return t;}

  allEdges.forEach(function(e){
    if(!visibleEdgeSet.has(e.from.id+'-'+e.to.id))return;
    var x1=e.from._x+ox,y1=e.from._y,x2=e.to._x+ox,y2=e.to._y;
    var isPath=pathEdgeKeys.has(e.from.id+'-'+e.to.id);
    var isNew=(e.from.id===newNodeId);
    var g=document.createElementNS(ns,'g');
    g.appendChild(el('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:isPath?'#6366f1':(isNew?'#f59e0b':'#d1d5db'),'stroke-width':isPath?3:1.8,'stroke-linecap':'round'}));
    var mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
    var px=-dy/len,py=dx/len,lx=mx+px*13,ly=my+py*13;
    if(isPath){g.appendChild(el('rect',{x:lx-10,y:ly-10,width:20,height:20,rx:6,fill:e.bit==='0'?'#dcfce7':'#fee2e2',stroke:e.bit==='0'?'#86efac':'#fca5a5','stroke-width':1.2}));}
    g.appendChild(txt(e.bit,{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-family':"'Courier New',monospace",'font-size':isPath?12:10,'font-weight':isPath?800:600,fill:e.bit==='0'?'#059669':'#dc2626',opacity:isPath?1:0.75}));
    svg.appendChild(g);
  });

  allNodes.forEach(function(n){
    if(!visibleNodeIds.has(n.id))return;
    var cx=n._x+ox,cy=n._y;
    var isPath=pathNodeIds.has(n.id);
    var isEnd=isPath&&n.isLeaf&&activeSymbol===n.label;
    var isRoot=(huffRoot&&n.id===huffRoot.id&&visibleNodeIds.size===steps[steps.length-1].treeNodes.length);
    var isNew=(n.id===newNodeId);
    var g=document.createElementNS(ns,'g');

    if(isFinalStep&&n.isLeaf){
      g.setAttribute('class','node-clickable');
      g.setAttribute('data-label',n.label);
      (function(label){
        g.addEventListener('click',function(){
          highlightSymbolFromTree(label);
        });
      })(n.label);
    }

    if(isPath||isNew){g.appendChild(el('circle',{cx:cx,cy:cy,r:NODE_R+5,fill:isNew&&!isPath?'rgba(245,158,11,0.15)':'rgba(99,102,241,0.12)',stroke:'none'}));}
    var fillColor,strokeColor,strokeW;
    if(isEnd){fillColor='#6366f1';strokeColor='#4338ca';strokeW=2.5;}
    else if(isPath){fillColor='#eef2ff';strokeColor='#6366f1';strokeW=2.5;}
    else if(isNew){fillColor='#fefce8';strokeColor='#fde047';strokeW=2;}
    else if(n.isLeaf){fillColor='#f5f3ff';strokeColor='#a5b4fc';strokeW=1.5;}
    else if(isRoot){fillColor='#f0fdf4';strokeColor='#6ee7b7';strokeW=1.5;}
    else{fillColor='#fff';strokeColor='#d1d5db';strokeW=1.5;}
    g.appendChild(el('circle',{cx:cx,cy:cy,r:NODE_R,fill:fillColor,stroke:strokeColor,'stroke-width':strokeW}));
    var tf=isEnd?'#fff':(isPath?'#3730a3':'#374151');
    if(n.isLeaf){
      g.appendChild(txt(n.label,{x:cx,y:cy-6,'text-anchor':'middle','dominant-baseline':'central','font-family':"'Segoe UI',Arial,sans-serif",'font-size':14,'font-weight':700,fill:tf}));
      g.appendChild(txt(r3(n.prob),{x:cx,y:cy+9,'text-anchor':'middle','dominant-baseline':'central','font-family':"'Segoe UI',Arial,sans-serif",'font-size':9,fill:isEnd?'rgba(255,255,255,.8)':(isPath?'#4338ca':'#9ca3af')}));
    } else {
      g.appendChild(txt(r3(n.prob),{x:cx,y:cy,'text-anchor':'middle','dominant-baseline':'central','font-family':"'Segoe UI',Arial,sans-serif",'font-size':11,'font-weight':600,fill:isRoot?'#065f46':(isPath?'#3730a3':(isNew?'#92400e':'#6b7280'))}));
    }
    svg.appendChild(g);
  });
}

function renderResults(data){
  var body=document.getElementById('result-body');
  body.innerHTML='';
  var sorted=data.slice().sort(function(a,b){return b.prob-a.prob;});
  sorted.forEach(function(d){
    var cw=codewords[d.name]||'';
    var tr=document.createElement('tr');
    tr.className='sym-clickable';
    tr.setAttribute('data-sym',d.name);
    tr.onclick=(function(name,row){return function(){highlightSymbol(name,row);};})(d.name,tr);
    tr.innerHTML='<td><strong>'+d.name+'</strong></td><td>'+d.prob+'</td><td><span class="cw-badge">'+cw+'</span></td><td>'+cw.length+'</td>';
    body.appendChild(tr);
  });
  var H=0,L=0;
  data.forEach(function(d){var p=d.prob,cw=codewords[d.name]||'';if(p>0)H-=p*Math.log2(p);L+=p*cw.length;});
  var eff=H>0?Math.round((H/L)*1000)/10:0;
  H=Math.round(H*1000)/1000;L=Math.round(L*1000)/1000;
  document.getElementById('metric-grid').innerHTML=
    '<div class="metric-card"><div class="metric-lbl">Entropy (H)</div><div class="metric-val">'+H+'</div><div class="metric-unit">bits / symbol</div></div>'+
    '<div class="metric-card"><div class="metric-lbl">Avg Length (L&#772;)</div><div class="metric-val">'+L+'</div><div class="metric-unit">bits / symbol</div></div>'+
    '<div class="metric-card"><div class="metric-lbl">Efficiency</div><div class="metric-val">'+eff+'%</div><div class="metric-unit">&eta; = H / L&#772;</div></div>';
}

function highlightSymbol(name,tr){
  if(activeSymbol===name){
    activeSymbol=null;
    document.querySelectorAll('.sym-active').forEach(function(e){e.classList.remove('sym-active');});
    document.getElementById('path-panel').style.display='none';
    currentStep=steps.length-1;
    renderTree();
    return;
  }
  activeSymbol=name;
  document.querySelectorAll('.sym-active').forEach(function(e){e.classList.remove('sym-active');});
  if(tr)tr.classList.add('sym-active');
  currentStep=steps.length-1;
  renderStep();
  showPathPanel(name);
}

function highlightSymbolFromTree(name){
  if(activeSymbol===name){
    activeSymbol=null;
    document.querySelectorAll('.sym-active').forEach(function(e){e.classList.remove('sym-active');});
    document.getElementById('path-panel').style.display='none';
    currentStep=steps.length-1;
    renderTree();
    return;
  }
  activeSymbol=name;
  document.querySelectorAll('.sym-active').forEach(function(e){e.classList.remove('sym-active');});
  var rows=document.querySelectorAll('#result-body tr');
  rows.forEach(function(row){
    if(row.getAttribute('data-sym')===name) row.classList.add('sym-active');
  });
  document.getElementById('tab-codewords').style.display='';
  document.getElementById('tab-metrics').style.display='none';
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab')[0].classList.add('active');
  currentStep=steps.length-1;
  renderStep();
  showPathPanel(name);
}

function showPathPanel(name){
  var cw=codewords[name]||'';
  var panel=document.getElementById('path-panel');
  panel.style.display='block';
  document.getElementById('path-title').innerHTML='Path for <strong style="color:#4338ca">'+name+'</strong> &nbsp;&rarr;&nbsp; Codeword: <span class="cw-badge">'+cw+'</span>';
  var stepsDiv=document.getElementById('path-steps');
  stepsDiv.innerHTML='';
  function badge(html,cls){var s=document.createElement('span');s.className=cls;s.innerHTML=html;stepsDiv.appendChild(s);}
  function arrow(){badge('&rarr;','path-arrow');}
  badge('Root <span style="color:#aaa;font-size:10px;margin-left:4px;">p=1</span>','path-node-badge');
  var cur=huffRoot;
  for(var i=0;i<cw.length;i++){
    var bit=cw[i];
    arrow();badge(bit,'path-bit-badge '+(bit==='0'?'b0':'b1'));
    badge(bit==='0'?'&#8592; L':'R &#8594;','path-dir');
    var next=bit==='0'?cur.left:cur.right;cur=next;
    if(cur){
      arrow();
      if(cur.isLeaf&&cur.label===name){
        badge(cur.label+' <span style="opacity:.7;font-size:10px;margin-left:4px;">p='+r3(cur.prob)+'</span>','path-leaf-badge');
      } else {
        badge((cur.isLeaf?cur.label:'&#8853;')+'<span style="color:#aaa;font-size:10px;margin-left:4px;">p='+r3(cur.prob)+'</span>','path-node-badge');
      }
    }
  }
  var note=document.createElement('div');
  note.style.cssText='width:100%;font-size:11px;color:#888;margin-top:6px;';
  note.textContent='Click the symbol again to deselect.';
  stepsDiv.appendChild(note);
}

function switchTab(tab,el){
  document.getElementById('tab-codewords').style.display=tab==='codewords'?'':'none';
  document.getElementById('tab-metrics').style.display=tab==='metrics'?'':'none';
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
}
function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById('page-'+id).classList.add('active');}
function goEdit(){showPage('input');document.getElementById('btn-edit').style.display='none';document.getElementById('btn-reset-top').style.display='none';}
function resetAll(){
  symbols=[];steps=[];codewords={};activeSymbol=null;huffRoot=null;nodeMap={};
  document.getElementById('symbol-rows').innerHTML='';
  document.getElementById('prob-sum-display').textContent='';
  document.getElementById('input-error').style.display='none';
  document.getElementById('path-panel').style.display='none';
  document.getElementById('btn-edit').style.display='none';
  document.getElementById('btn-reset-top').style.display='none';
  showPage('input');
  addRow('A','0.35');addRow('B','0.25');addRow('C','0.20');addRow('D','0.12');addRow('E','0.08');
  updateSum();
}

addRow('A','0.35');addRow('B','0.25');addRow('C','0.20');addRow('D','0.12');addRow('E','0.08');

(function(){
  var handle=document.getElementById('drag-handle');
  var treeWrap=document.getElementById('tree-wrap');
  var bottomPanel=document.getElementById('panel-bottom');
  var dragging=false,startY=0,startTreeH=0,startBotH=0;

  handle.addEventListener('mousedown',function(e){
    dragging=true;
    startY=e.clientY;
    startTreeH=treeWrap.getBoundingClientRect().height;
    startBotH=bottomPanel.getBoundingClientRect().height;
    handle.classList.add('dragging');
    document.body.style.cursor='row-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });

  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var dy=e.clientY-startY;
    var newTreeH=Math.max(60,startTreeH+dy);
    var newBotH=Math.max(60,startBotH-dy);
    treeWrap.style.flex='none';
    treeWrap.style.height=newTreeH+'px';
    bottomPanel.style.flex='none';
    bottomPanel.style.height=newBotH+'px';
  });

  document.addEventListener('mouseup',function(){
    if(!dragging)return;
    dragging=false;
    handle.classList.remove('dragging');
    document.body.style.cursor='';
    document.body.style.userSelect='';
  });

  handle.addEventListener('touchstart',function(e){
    dragging=true;
    startY=e.touches[0].clientY;
    startTreeH=treeWrap.getBoundingClientRect().height;
    startBotH=bottomPanel.getBoundingClientRect().height;
    handle.classList.add('dragging');
    e.preventDefault();
  },{passive:false});

  document.addEventListener('touchmove',function(e){
    if(!dragging)return;
    var dy=e.touches[0].clientY-startY;
    var newTreeH=Math.max(60,startTreeH+dy);
    var newBotH=Math.max(60,startBotH-dy);
    treeWrap.style.flex='none';
    treeWrap.style.height=newTreeH+'px';
    bottomPanel.style.flex='none';
    bottomPanel.style.height=newBotH+'px';
  },{passive:true});

  document.addEventListener('touchend',function(){
    dragging=false;
    handle.classList.remove('dragging');
  });
})();
</script>
